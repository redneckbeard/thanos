name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Build
        run: go build ./...

      - name: Validate README links
        run: python3 scripts/validate-readme-links.py

      - name: Style tests
        run: go test ./compiler

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install gems
        run: gem install diff-lcs

      - name: Gauntlet tests
        run: go run main.go test
